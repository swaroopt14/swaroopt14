# ─────────────────────────────────────────────────────────────────────────────
# Kong JWT Secret — ExternalSecret pulls from AWS Secrets Manager
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kong-jwt-secret
  namespace: api-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: kong-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: JWT_SIGNING_SECRET
      remoteRef:
        key: production/zord/app-secrets
        property: JWT_SIGNING_SECRET
