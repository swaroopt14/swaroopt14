# ─────────────────────────────────────────────────────────────────────────────
# Kong Routes: zord-evidence (Evidence Packs & Merkle Proofs)
# ─────────────────────────────────────────────────────────────────────────────
# These routes are defined in kong/configmap.yaml (declarative config).
# This file serves as documentation and reference.
#
# Service: zord-evidence
# Upstream: http://zord-evidence.zord.svc.cluster.local:8088
# Port: 8088
#
# Routes:
#   - name: evidence-packs
#     path: /v1/evidence
#     description: Evidence pack listing, download, status
#     auth: Bearer token
#     rate_limit: 300/min (global)
#
#   - name: evidence-verify
#     path: /v1/verify
#     description: Merkle proof verification, signature validation
#     auth: Bearer token (or public for external auditors)
#     rate_limit: 300/min (global)
#
#   - name: evidence-health
#     path: /evidence/health
#     description: Health check endpoint
#     auth: None
#
# Notes:
#   - Evidence packs are cryptographically signed (ed25519)
#   - Verification endpoint may be made public for external auditors
#   - Archives stored in S3 (swaroop-vault2 bucket)
# ─────────────────────────────────────────────────────────────────────────────
