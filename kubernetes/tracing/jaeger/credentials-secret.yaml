apiVersion: v1
kind: Secret
metadata:
  name: jaeger-credentials
  namespace: tracing
  labels:
    app: jaeger
type: Opaque
stringData:
  # htpasswd format: username:bcrypt_hash
  # Username: jaeger  Password: Arealiszord@2026
  htpasswd: |
    jaeger:$apr1$mvlh3286$tuj3L7B4K.J0L5/y9CVxP/
  # nginx.conf for basic auth reverse proxy
  nginx.conf: |
    events { worker_connections 128; }
    http {
      server {
        listen 8080;
        location / {
          auth_basic "Jaeger UI";
          auth_basic_user_file /etc/nginx/htpasswd;
          proxy_pass http://127.0.0.1:16686;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
        location /health {
          proxy_pass http://127.0.0.1:16686/;
          auth_basic off;
        }
      }
    }
