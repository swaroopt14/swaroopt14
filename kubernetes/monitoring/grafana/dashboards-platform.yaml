apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-platform
  namespace: monitoring
data:
  platform-health.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "title": "HPA — Current vs Desired Replicas",
          "type": "table",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "targets": [
            {"expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=~\"zord|api-gateway\"}", "format": "table", "instant": true, "refId": "A"},
            {"expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=~\"zord|api-gateway\"}", "format": "table", "instant": true, "refId": "B"}
          ]
        },
        {
          "title": "PVC Disk Usage %",
          "type": "gauge",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 8},
          "targets": [{"expr": "(1 - (kubelet_volume_stats_available_bytes{namespace=\"zord\"} / kubelet_volume_stats_capacity_bytes{namespace=\"zord\"})) * 100", "legendFormat": "{{persistentvolumeclaim}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}}}
        },
        {
          "title": "Postgres Connections",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 8},
          "targets": [{"expr": "pg_stat_activity_count{datname=~\"zord.*\"}", "legendFormat": "{{datname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Kafka Consumer Lag",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 8},
          "targets": [{"expr": "kafka_consumer_group_lag{topic=~\"payments.*|relay.*\"}", "legendFormat": "{{topic}} - {{group}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Pod Restarts (Last 1h)",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 14},
          "targets": [{"expr": "increase(kube_pod_container_status_restarts_total{namespace=~\"zord|api-gateway\"}[1h])", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "OOM Killed Containers",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 14},
          "targets": [{"expr": "sum(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\", namespace=~\"zord|api-gateway\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}}}
        },
        {
          "title": "Pending Pods",
          "type": "stat",
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 14},
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Pending\", namespace=~\"zord|api-gateway\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}}}
        },
        {
          "title": "Service Response Time (p95) — via Kong",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(kong_upstream_latency_ms_bucket[5m])) by (le, service))", "legendFormat": "{{service}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "ms"}}
        },
        {
          "title": "Error Rate per Service (5xx)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "sum(rate(kong_http_requests_total{code=~\"5..\"}[5m])) by (service)", "legendFormat": "{{service}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "title": "Kafka Topics — Messages/sec",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "targets": [{"expr": "sum(rate(kafka_server_brokertopicmetrics_messagesin_total[5m])) by (topic)", "legendFormat": "{{topic}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "msg/s"}}
        },
        {
          "title": "External Secrets Sync Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 28},
          "targets": [{"expr": "count(externalsecret_status_condition{status=\"True\", condition=\"Ready\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Ingress Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
          "targets": [{"expr": "sum(rate(kong_http_requests_total[5m])) by (route)", "legendFormat": "{{route}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["platform", "zord", "production"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "Zord Platform Health & Alerts",
      "uid": "zord-platform-health"
    }
