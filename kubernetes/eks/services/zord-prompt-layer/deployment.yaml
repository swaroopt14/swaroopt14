apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-prompt-layer
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-prompt-layer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-prompt-layer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zord-aws-access
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-prompt-layer
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-prompt-layer
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-prompt-layer
      containers:
        - name: zord-prompt-layer
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-prompt-layer:v12
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: SERVICE_NAME
              value: zord-prompt-layer
            - name: HTTP_PORT
              value: "8086"
            - name: GEMINI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: GEMINI_API_KEYS
            - name: GEMINI_MODEL
              value: gemini-3.1-flash-lite
            - name: GEMINI_BASE_URL
              value: https://generativelanguage.googleapis.com/v1beta
            - name: EDGE_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EDGE_READ_DSN
            - name: INTENT_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTENT_READ_DSN
            - name: RELAY_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: RELAY_READ_DSN
            - name: INTELLIGENCE_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTELLIGENCE_READ_DSN
            - name: EVIDENCE_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_READ_DSN
            - name: OUTCOME_READ_DSN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: OUTCOME_READ_DSN
            - name: INTELLIGENCE_BASE_URL
              value: http://zord-intelligence:8089
            - name: INTELLIGENCE_API_TIMEOUT_SEC
              value: "3"
            - name: DEFAULT_TOP_K
              value: "5"
            - name: REDIS_URL
              value: redis://zord-prompt-layer-redis:6379/0
            - name: MEMORY_TTL_SECONDS
              value: "3600"
            - name: MEMORY_MAX_TURNS
              value: "8"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-prompt-layer
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
