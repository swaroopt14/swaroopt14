services:
  zord-console:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:18-alpine}
    container_name: zord-console
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_PROMPT_LAYER_URL=${NEXT_PUBLIC_PROMPT_LAYER_URL:-/api/prompt-layer}
      - PROMPT_LAYER_URL=${PROMPT_LAYER_URL:-http://localhost:8086}
      # Default 8089 matches zord-intelligence (see config/api.endpoints.ts). 8080 is zord-edge — wrong target for KPI/batch proxies.
      - ZORD_INTELLIGENCE_URL=${ZORD_INTELLIGENCE_URL:-http://host.docker.internal:8089}
      - ZORD_BULK_INGEST_API_KEY=${ZORD_BULK_INGEST_API_KEY:-}
      - ZORD_BULK_INGEST_SOURCE_TYPE=${ZORD_BULK_INGEST_SOURCE_TYPE:-batch_upload}
      - ZORD_BULK_INGEST_SOURCE_CLASS=${ZORD_BULK_INGEST_SOURCE_CLASS:-operator}
      - ZORD_EDGE_URL=${ZORD_EDGE_URL:-http://host.docker.internal:8080}
      # Outcome-engine settlement upload (BFF default is localhost:8081 — wrong inside this container).
      - ZORD_SETTLEMENT_URL=${ZORD_SETTLEMENT_URL:-http://host.docker.internal:8081}
      - ZORD_SETTLEMENT_API_KEY=${ZORD_SETTLEMENT_API_KEY:-}
      - ZORD_VAULT_URL=${ZORD_VAULT_URL:-http://host.docker.internal:8081}
      - ZORD_RELAY_URL=${ZORD_RELAY_URL:-http://host.docker.internal:8082}
      - ZORD_INTENT_ENGINE_URL=${ZORD_INTENT_ENGINE_URL:-http://host.docker.internal:8083}
      - ZORD_CONTRACTS_URL=${ZORD_CONTRACTS_URL:-http://host.docker.internal:8084}
      - ZORD_PII_ENCLAVE_URL=${ZORD_PII_ENCLAVE_URL:-http://host.docker.internal:8085}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zord-network

networks:
  zord-network:
    driver: bridge
