apiVersion: v1
kind: Secret
metadata:
  name: zord-app-secrets
type: Opaque
stringData:
  POSTGRES_SUPERUSER_PASSWORD: change-me-postgres-superuser-password
  EDGE_DB_PASSWORD: change-me-edge-password
  INTENT_DB_PASSWORD: change-me-intent-password
  RELAY_DB_PASSWORD: change-me-relay-password
  TOKEN_DB_PASSWORD: change-me-token-password
  OUTCOME_DB_PASSWORD: change-me-outcome-password
  EVIDENCE_DB_PASSWORD: change-me-evidence-password
  INTELLIGENCE_DB_PASSWORD: change-me-intelligence-password
  ZORD_VAULT_KEY: change-me-shared-vault-key
  INTERNAL_ADMIN_KEY: change-me-internal-admin-key
  MASTER_KEY: change-me-base64-32-byte-master-key
  TOKEN_SECRET: change-me-base64-token-secret
  EVIDENCE_SIGNING_PRIVATE_KEY_BASE64: change-me-base64-ed25519-private-key
  EVIDENCE_ARCHIVE_ENCRYPTION_KEY_BASE64: change-me-base64-archive-encryption-key
  GEMINI_API_KEYS: change-me-gemini-api-key-1,change-me-gemini-api-key-2
  RELAY_SERVICES_0_AUTH_TOKEN: change-me-relay-upstream-token
  RELAY_SERVICES_1_AUTH_TOKEN: change-me-relay-upstream-token
  RELAY_SERVICES_2_AUTH_TOKEN: change-me-relay-upstream-token
  RELAY_DB_URL: postgres://relay_user:change-me-relay-password@zord-postgres:5432/zord_relay_db?sslmode=disable
  INTELLIGENCE_DATABASE_URL: postgres://zpi:change-me-intelligence-password@zord-postgres:5432/zord_intelligence?sslmode=disable
  EDGE_READ_DSN: postgres://zord_user:change-me-edge-password@zord-postgres:5432/zord_edge_db?sslmode=disable
  INTENT_READ_DSN: postgres://intent_user:change-me-intent-password@zord-postgres:5432/zord_intent_engine_db?sslmode=disable
  RELAY_READ_DSN: postgres://relay_user:change-me-relay-password@zord-postgres:5432/zord_relay_db?sslmode=disable
  INTELLIGENCE_READ_DSN: postgres://zpi:change-me-intelligence-password@zord-postgres:5432/zord_intelligence?sslmode=disable
  EVIDENCE_READ_DSN: postgres://evidence_user:change-me-evidence-password@zord-postgres:5432/zord_evidence_db?sslmode=disable
