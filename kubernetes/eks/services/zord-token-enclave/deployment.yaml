apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-token-enclave
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-token-enclave
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-token-enclave
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 45
      serviceAccountName: zord-aws-access
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-token-enclave
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-token-enclave
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-token-enclave
      containers:
        - name: zord-token-enclave
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-token-enclave:v5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: PORT
              value: "8087"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_PORT
            - name: DB_USER
              value: token_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: TOKEN_DB_PASSWORD
            - name: DB_NAME
              value: zord_token_enclave_db
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_SSLMODE
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: MASTER_KEY
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: TOKEN_SECRET
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: KAFKA_BROKERS
            - name: ENCLAVE_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: ENCLAVE_INTERNAL_TOKEN
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-token-enclave
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
