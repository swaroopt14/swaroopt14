apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-console
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-console
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: zord-aws-access
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-console
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-console
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-console
      containers:
        - name: zord-console
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-console:v10
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: AUTH_COOKIE_SECURE
              value: "true"
            - name: ZORD_EDGE_URL
              value: http://zord-edge:8080
            - name: ZORD_VAULT_URL
              value: http://zord-edge:8080
            - name: ZORD_RELAY_URL
              value: http://zord-relay:8082
            - name: ZORD_INTENT_ENGINE_URL
              value: http://zord-intent-engine:8083
            - name: ZORD_CONTRACTS_URL
              value: http://zord-relay:8082
            - name: ZORD_PII_ENCLAVE_URL
              value: http://zord-token-enclave:8087
            - name: ZORD_INTELLIGENCE_URL
              value: http://zord-intelligence:8089
            - name: ZORD_SETTLEMENT_URL
              value: http://zord-outcome-engine:8081
            - name: ZORD_EVIDENCE_URL
              value: http://zord-evidence:8088
            - name: PROMPT_LAYER_URL
              value: http://zord-prompt-layer:8086
            - name: NEXT_PUBLIC_PROMPT_LAYER_URL
              value: /api/prompt-layer
            - name: ZORD_BULK_INGEST_SOURCE_TYPE
              value: CSV
            - name: ZORD_BULK_INGEST_SOURCE_CLASS
              value: INTENT
            - name: SLACK_LEADS_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: SLACK_LEADS_WEBHOOK_URL
            - name: SLACK_SUPPORT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: SLACK_SUPPORT_WEBHOOK_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
