# ─────────────────────────────────────────────────────────────────────────────
# Kong Plugin: Request Logging (Audit Trail)
# ─────────────────────────────────────────────────────────────────────────────
# Configured in kong/configmap.yaml (declarative config).
# This file serves as documentation and reference.
#
# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Plugin: file-log
# Output: /dev/stdout (captured by Kubernetes logging / Fluentd)
#
# Applied to routes:
#   - edge-admin         (tenant registration, admin ops)
#   - edge-bulk-ingest   (payment file uploads)
#   - outcome-settlement (settlement file uploads)
#
# NOT applied globally (too noisy for health checks and static assets).
#
# ═══════════════════════════════════════════════════════════════════════════════
# LOG FORMAT (JSON — one line per request)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Each log entry contains:
#   {
#     "request": {
#       "method": "POST",
#       "uri": "/v1/bulk-ingest",
#       "headers": { ... },
#       "size": 1234567
#     },
#     "response": {
#       "status": 200,
#       "headers": { ... },
#       "size": 456
#     },
#     "route": { "name": "edge-bulk-ingest" },
#     "service": { "name": "zord-edge" },
#     "latencies": {
#       "proxy": 150,
#       "kong": 5,
#       "request": 155
#     },
#     "client_ip": "203.0.113.42",
#     "started_at": 1716912000000
#   }
#
# ═══════════════════════════════════════════════════════════════════════════════
# VIEWING LOGS
# ═══════════════════════════════════════════════════════════════════════════════
#
# Kubernetes:
#   kubectl logs -n api-gateway deploy/kong-gateway --tail=50
#
# If logging stack is deployed (kubernetes/logging/):
#   Logs flow: Kong stdout → Fluentd → Elasticsearch
#   Search in Kibana: kubernetes.labels.app_kubernetes_io/name: kong-gateway
#
# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION UPGRADE PATH
# ═══════════════════════════════════════════════════════════════════════════════
#
# For centralized logging, replace file-log with:
#   - http-log: POST logs to a logging endpoint
#   - tcp-log: Stream to Logstash/Fluentd TCP input
#   - syslog: Send to syslog server
#
# Example http-log config:
#   - name: http-log
#     config:
#       http_endpoint: http://fluentd.logging.svc.cluster.local:9880/kong.logs
#       method: POST
#       content_type: application/json
#       timeout: 5000
#       keepalive: 60000
# ─────────────────────────────────────────────────────────────────────────────
