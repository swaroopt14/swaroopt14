apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-admin-ui
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: kong-admin-ui
    app.kubernetes.io/component: admin-ui
    app.kubernetes.io/part-of: arealis-zord
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kong-admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong-admin-ui
    spec:
      containers:
        - name: kong-admin-ui
          # Kong Admin API viewer — lightweight Node.js dashboard
          image: pantsel/konga:0.14.9
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: KONGA_HOOK_TIMEOUT
              value: "120000"
            - name: DB_ADAPTER
              value: localDiskDb
            - name: KONGA_LOG_LEVEL
              value: info
            - name: NO_AUTH
              value: "true"
            - name: BASE_URL
              value: http://localhost:1337
          ports:
            - name: http
              containerPort: 1337
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 1337
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 1337
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
