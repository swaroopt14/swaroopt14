apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-token-enclave
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-token-enclave
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-token-enclave
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-token-enclave
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-token-enclave
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-token-enclave
      containers:
        - name: zord-token-enclave
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/zord-token-enclave:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: PORT
              value: "8087"
            - name: DB_HOST
              value: zord-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: token_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: TOKEN_DB_PASSWORD
            - name: DB_NAME
              value: zord_token_enclave_db
            - name: DB_SSLMODE
              value: disable
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: MASTER_KEY
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: TOKEN_SECRET
            - name: KAFKA_BROKERS
              value: zord-kafka:9092
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
