apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: api-gateway
  labels:
    app: kong
spec:
  selector:
    app: kong
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: proxy-ssl
      port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
  namespace: api-gateway
  labels:
    app: kong
spec:
  selector:
    app: kong
  ports:
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kong-metrics
  namespace: api-gateway
  labels:
    app: kong
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8100"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: kong
  ports:
    - name: metrics
      port: 8100
      targetPort: 8100
      protocol: TCP
