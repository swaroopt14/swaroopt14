# ─────────────────────────────────────────────────────────────────────────────
# Kong Routes: zord-outcome-engine (Settlement & Reconciliation)
# ─────────────────────────────────────────────────────────────────────────────
# These routes are defined in kong/configmap.yaml (declarative config).
# This file serves as documentation and reference.
#
# Service: zord-outcome-engine
# Upstream: http://zord-outcome-engine.zord.svc.cluster.local:8081
# Port: 8081
#
# Routes:
#   - name: outcome-settlement
#     path: /v1/settlement
#     description: Settlement file upload (XLSX), job status polling
#     auth: Bearer token
#     rate_limit: 20/min (stricter — heavy file processing)
#     logging: file-log enabled (audit)
#     timeout: 120s (large file processing)
#
#   - name: outcome-reconciliation
#     path: /v1/reconciliation
#     description: Reconciliation results, variance reports, match status
#     auth: Bearer token
#     rate_limit: 300/min (global)
#
#   - name: outcome-health
#     path: /outcome/health
#     description: Health check endpoint
#     auth: None
#
# Notes:
#   - Settlement upload accepts XLSX files (Razorpay PSP format)
#   - Higher timeouts (120s) for large file processing
#   - Stricter rate limits on upload (20/min) to prevent resource exhaustion
# ─────────────────────────────────────────────────────────────────────────────
