apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─────────────────────────────────────────────────────────────────────────────
# Kong API Gateway — Kustomize Entrypoint
# ─────────────────────────────────────────────────────────────────────────────
# Deploy: kubectl apply -k kubernetes/api-gateway
# Verify: kubectl get pods -n api-gateway
# ─────────────────────────────────────────────────────────────────────────────

labels:
  - pairs:
      app.kubernetes.io/part-of: arealis-zord
      app.kubernetes.io/component: api-gateway

resources:
  # Namespace
  - namespace.yaml

  # Kong Gateway
  - kong/deployment.yaml
  - kong/service.yaml
  - kong/configmap.yaml
  - kong/serviceaccount.yaml
  - kong/secret-store.yaml
  - kong/jwt-secret.yaml
  - kong/hpa.yaml
  - kong/pdb.yaml

  # Kong Admin UI (Dashboard)
  - kong-admin-ui/deployment.yaml
  - kong-admin-ui/service.yaml
  - kong-admin-ui/secret.yaml

  # ALB Ingress (Internet → Kong)
  - ingress/alb-ingress.yaml
