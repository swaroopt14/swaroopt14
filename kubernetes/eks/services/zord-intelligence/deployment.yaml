apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-intelligence
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-intelligence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-intelligence
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-intelligence
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intelligence
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intelligence
      containers:
        - name: zord-intelligence
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/zord-intelligence:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: HTTP_PORT
              value: "8089"
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTELLIGENCE_DATABASE_URL
            - name: KAFKA_BROKERS
              value: zord-kafka:9092
            - name: KAFKA_GROUP_ID
              value: zord-intelligence-group
            - name: INTELLIGENCE_MODE
              value: GRADE_A
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8089
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
