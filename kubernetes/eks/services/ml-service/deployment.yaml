apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-ml-service
spec:
  replicas: 1
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-ml-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-ml-service
    spec:
      serviceAccountName: zord-aws-access
      terminationGracePeriodSeconds: 30
      containers:
        - name: zord-ml-service
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/ml-service:v12
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: KAFKA_BROKERS
            - name: KAFKA_GROUP_ID
              value: ml-service-group
            - name: ML_REQUEST_TOPIC
              value: ml.request.events
            - name: ML_RESULT_TOPIC
              value: ml.result.events
            - name: LR_MODEL_PATH
              value: /data/lr_model.json
            - name: RCA_MODEL_PATH
              value: /data/rca_model.pkl
            - name: LEAKAGE_MODEL_PATH
              value: /data/leakage_prediction_bundle.joblib
            - name: INTELLIGENCE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTELLIGENCE_DATABASE_URL
            - name: RCA_RETRAIN_THRESHOLD
              value: "50"
            - name: LEAKAGE_RETRAIN_THRESHOLD
              value: "50"
          volumeMounts:
            - name: model-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - python
                - /app/healthcheck.py
            initialDelaySeconds: 60
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
                - python
                - /app/healthcheck.py
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: model-data
          emptyDir: {}
