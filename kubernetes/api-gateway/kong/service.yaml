apiVersion: v1
kind: Service
metadata:
  name: kong-gateway
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: kong-gateway
    app.kubernetes.io/component: api-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kong-gateway
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: proxy-ssl
      port: 443
      targetPort: 8443
      protocol: TCP
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: metrics
      port: 8100
      targetPort: 8100
      protocol: TCP
