## ═══════════════════════════════════════════════════════════════════
## Elasticsearch + Kibana Credentials Secret
## ═══════════════════════════════════════════════════════════════════
## IMPORTANT: Change passwords below before deploying to production!
##
## After changing passwords here, you must:
##   1. kubectl delete secret elasticsearch-credentials -n logging
##   2. kubectl apply -f credentials-secret.yaml
##   3. kubectl rollout restart statefulset elasticsearch -n logging
##   4. kubectl rollout restart deployment kibana -n logging
##   5. kubectl rollout restart daemonset fluentd -n logging
##   6. kubectl delete job kibana-init -n logging
##   7. kubectl apply -f ../kibana/init-job.yaml
## ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-credentials
  namespace: logging
  labels:
    app: elasticsearch
    component: security
type: Opaque
stringData:
  # ── Elasticsearch superuser password ──
  # Used by: elasticsearch statefulset, fluentd, kibana-init job
  ELASTIC_PASSWORD: "Arealiszord@2026"

  # ── Kibana system account password ──
  # Used by: kibana deployment to connect to ES
  # The init-job sets this password in ES via the _security API
  KIBANA_SYSTEM_PASSWORD: "Arealiszord@2026"

  # ── Kibana encryption key (32+ chars required) ──
  # Used by: kibana for encrypting saved objects, sessions, reports
  KIBANA_ENCRYPTION_KEY: "zord-kibana-enc-key-2025-arealis-prod-32chars"
