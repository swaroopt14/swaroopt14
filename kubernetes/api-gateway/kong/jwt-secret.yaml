# ─────────────────────────────────────────────────────────────────────────────
# JWT Public Key Secret
# ─────────────────────────────────────────────────────────────────────────────
# This secret holds the RSA public key used by Kong to verify JWT tokens.
#
# OPTION A: Use ExternalSecrets Operator to sync from AWS Secrets Manager
# (recommended for production — see external-secret-jwt.yaml)
#
# OPTION B: Create manually for testing:
#   kubectl create secret generic kong-jwt-public-key \
#     --namespace=api-gateway \
#     --from-file=jwt.pub=/path/to/your/public-key.pem
#
# The public key must match the private key used by your auth service
# (zord-edge or a dedicated auth service) to sign JWTs.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: kong-jwt-public-key
  namespace: api-gateway
  labels:
    app: kong
    app.kubernetes.io/part-of: arealis-zord
type: Opaque
# Replace with your actual base64-encoded RSA public key PEM
# echo -n "$(cat jwt.pub)" | base64
data: {}
# data:
#   jwt.pub: <base64-encoded-rsa-public-key-pem>
---
# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret — pulls JWT public key from AWS Secrets Manager
# Requires: external-secrets operator + ClusterSecretStore named "aws-secrets"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kong-jwt-public-key
  namespace: api-gateway
  labels:
    app: kong
    app.kubernetes.io/part-of: arealis-zord
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  target:
    name: kong-jwt-public-key
    creationPolicy: Owner
  data:
    - secretKey: jwt.pub
      remoteRef:
        key: zord/kong-jwt-public-key
        property: public_key
