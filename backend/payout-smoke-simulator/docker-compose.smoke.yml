services:
  payout-smoke-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payout-smoke-simulator
    ports:
      - "${SMOKE_SIMULATOR_PORT:-8099}:8099"
    environment:
      PORT: "8099"
      SMOKE_TENANT_ID: "${SMOKE_TENANT_ID:-00000000-0000-0000-0000-000000000001}"
      SMOKE_API_KEY: "${SMOKE_API_KEY:-zord-local-dev-api-key}"
      # Artificial latency (ms) on heavy list routes — set 0 to disable
      SMOKE_LATENCY_MS: "${SMOKE_LATENCY_MS:-120}"
      SMOKE_DEMO_DAY_COUNT: "${SMOKE_DEMO_DAY_COUNT:-366}"
      SMOKE_BATCH_COUNT: "${SMOKE_BATCH_COUNT:-366}"
    restart: unless-stopped
