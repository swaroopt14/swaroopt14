relay:
  # instance_id is auto-detected from hostname (pod name in Kubernetes).
  # Override here for local development.
  # instance_id: relay-dev-1

  poll_interval: 2s          # Sleep between empty lease cycles
  lease_limit: 500            # Events per lease call
  lease_ttl_seconds: 120      # How long upstream holds the lock
  max_publish_concurrency: 10 # Semaphore: max in-flight Kafka publishes per worker
  shutdown_timeout: 30s       # SIGTERM drain window

kafka:
  brokers: "kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092"

  # SASL/SCRAM-SHA-512 — recommended for fintech production.
  # Inject via env: RELAY_KAFKA_SASL_USERNAME / RELAY_KAFKA_SASL_PASSWORD
  sasl_mechanism: SCRAM-SHA-512
  sasl_username: ""
  sasl_password: ""
  tls_enabled: false

  # Producer durability settings — do not relax these in production.
  acks: "all"
  linger_ms: 5
  compression_type: snappy
  message_max_bytes: 1048576  # 1 MiB hard cap
  delivery_timeout: 30s

  # DLQ topics — must be pre-created with appropriate retention.
  dlq_publish_failure_topic: relay.dlq.publish_failure
  dlq_poison_topic: relay.dlq.poison

# One entry per upstream service relay polls.
services:
  - name: intent-engine
    base_url: http://zord-intent-engine-service:8083
    auth_token: "dev-dummy-token-123"
    http_timeout: 15s
    default_topic: payments.intent.events.v1
    # Per-service retry overrides (optional — defaults are production-safe).
    # max_retry_attempts: 20
    # retry_base_delay: 1s
    # retry_max_delay: 5m

  - name: ledger-service
    base_url: http://zord-edge-service:8080
    auth_token: "dev-dummy-token-123"
    http_timeout: 15s
    default_topic: payments.ledger.events.v1

  - name: outcome-engine
    base_url: http://zord-outcome-engine-service:8081
    auth_token: "dev-dummy-token-123"
    http_timeout: 15s
    # All Merkle leaf-bundle events land on this dedicated topic.
    # zord-evidence consumes it with group: evidence-outcome-consumer-group.
    default_topic: payments.outcome.events.v1

  - name: evidence-service
    base_url: http://zord-evidence-service:8088
    auth_token: "dev-dummy-token-123"
    http_timeout: 15s
    default_topic: evidence.pack.created

tracing:
  enabled: true
  otlp_endpoint: "http://tempo.observability.svc.cluster.local:4318"
  service_name: relay-service
  environment: production

metrics:
  enabled: true
  addr: ":9090"  # Prometheus scrapes /metrics on this port

# ── Service 4 own database ──────────────────────────────────────────────────
# Connection string is injected via env: RELAY_DB_URL (overrides this value).
db:
  url: "postgres://relay_user:relay_password@postgres:5432/zord_relay_db?sslmode=disable"
  max_open_conns: 20
  max_idle_conns: 5

# ── PSP (Payment Service Provider) client ───────────────────────────────────
# Use RELAY_PSP_BASE_URL / RELAY_PSP_TIMEOUT_SECONDS env overrides in production.
psp:
  base_url: "http://localhost:8099"
  timeout_seconds: 30

# ── Token Enclave (Service 3) ────────────────────────────────────────────────
# Use RELAY_TOKEN_ENCLAVE_BASE_URL env override in production.
token_enclave:
  base_url: ""          # Required — set via RELAY_TOKEN_ENCLAVE_BASE_URL
  timeout_seconds: 10

# ── Dispatch loop (Step 0–5 lifecycle) ──────────────────────────────────────
dispatch:
  # Toggle dispatch responsibilities (Kafka consumer + dispatch workers/sweepers).
  # true  = dispatch enabled (normal mode)
  # false = disable dispatch; Kafka publish responsibilities continue to run.
  enabled: false

  # Kafka consumer configuration for consuming payments.intent.events.v1.
  consumer_group_id: "dispatch-loop-group"
  topic: "payments.intent.events.v1"
  poll_timeout: 200ms

  # PSP connector identity — determines which corridor to use by default.
  # Overridden per-event by payload.beneficiary.instrument.kind.
  connector_id: "razorpayx-v1"
  default_corridor_id: "IMPS"

  # Dispatch worker pool — concurrent PSP calls (Gap 14 fix).
  # Each worker handles one message at a time. Controls max concurrent PSP calls.
  # Must not exceed DB max_open_conns minus relay_loop workers.
  worker_count: 4

  # Circuit breaker: pause new dispatches after this many consecutive PSP failures.
  psp_circuit_breaker_threshold: 5
  psp_circuit_reset_seconds: 60

# ── Relay outbox Kafka publisher loop ───────────────────────────────────────
relay_loop:
  worker_count: 2
  batch_size: 50
  poll_interval: 2s
  # Topics dispatched dispatch-lifecycle events to (consumed by Service 5).
  dispatch_events_topic: "payments.dispatch.events.v1"
  publish_failure_dlq_topic: "relay.dlq.publish_failure"
  poison_event_dlq_topic: "relay.dlq.poison"

# ── Retry sweeper (FAILED_RETRYABLE) ────────────────────────────────────────
retry_sweeper:
  interval: 30s
  batch_size: 20

# ── Recovery sweeper (SENT + AWAITING_PROVIDER_SIGNAL) ───────────────────────
# Fixes Gaps 1, 2, 3: queries PSP to resolve stuck dispatches.
# sent_timeout_seconds must be > psp.timeout_seconds to avoid false positives.
recovery_sweeper:
  interval: 60s
  sent_timeout_seconds: 120     # psp.timeout_seconds * 2
  awaiting_timeout_seconds: 300 # 5 minutes
  batch_size: 50
