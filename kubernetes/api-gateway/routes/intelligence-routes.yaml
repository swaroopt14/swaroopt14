# ─────────────────────────────────────────────────────────────────────────────
# Kong Routes: zord-intelligence (Policies, Projections, RCA)
# ─────────────────────────────────────────────────────────────────────────────
# These routes are defined in kong/configmap.yaml (declarative config).
# This file serves as documentation and reference.
#
# Service: zord-intelligence
# Upstream: http://zord-intelligence.zord.svc.cluster.local:8089
# Port: 8089
#
# Routes:
#   - name: intelligence-projections
#     path: /v1/projections
#     description: Tenant projections, risk scores, SLA status
#     auth: Bearer token
#     rate_limit: 300/min (global)
#
#   - name: intelligence-policies
#     path: /v1/policies
#     description: Policy CRUD, enforcement rules, thresholds
#     auth: Bearer token / Admin key
#     rate_limit: 300/min (global)
#
#   - name: intelligence-rca
#     path: /v1/rca
#     description: Root cause analysis results, cluster summaries
#     auth: Bearer token
#     rate_limit: 300/min (global)
#
#   - name: intelligence-health
#     path: /intelligence/health
#     description: Health check endpoint
#     auth: None
#
# Notes:
#   - Intelligence service communicates with ml-service via Kafka
#   - ML requests/results flow through ml.request.events / ml.result.events
#   - RCA clustering uses HDBSCAN (Python ml-service)
#   - Projections are pre-computed and cached
# ─────────────────────────────────────────────────────────────────────────────
