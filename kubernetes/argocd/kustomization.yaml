apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ─────────────────────────────────────────────────────────────────────────────
# Argo CD GitOps — Kustomize Entrypoint
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Steps:
#   1. kubectl apply -f kubernetes/argocd/namespace.yaml
#   2. kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
#   3. kubectl apply -f kubernetes/argocd/argocd-cm-patch.yaml
#   4. kubectl apply -f kubernetes/argocd/ingress.yaml
#   5. kubectl apply -f kubernetes/argocd/apps/
#
# DO NOT use "kubectl apply -k" for this folder — Argo CD is installed
# from upstream manifests first, then we apply our customizations on top.
# ─────────────────────────────────────────────────────────────────────────────

resources:
  - namespace.yaml
  - secret.yaml
  - argocd-cm-patch.yaml
  - ingress.yaml
  - apps/zord-app.yaml
  - apps/kong-app.yaml
  - apps/monitoring-app.yaml
  - apps/logging-app.yaml
  - apps/tracing-app.yaml
