apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  kubernetes-cluster.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Cluster Nodes",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{"expr": "count(kube_node_info)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Running Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Running\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Failed Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Failed\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}}}
        },
        {
          "title": "Total CPU Cores",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "targets": [{"expr": "sum(machine_cpu_cores)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "title": "Total Memory (GB)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "targets": [{"expr": "sum(machine_memory_bytes) / 1024 / 1024 / 1024", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decgbytes", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "title": "Namespaces",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "targets": [{"expr": "count(kube_namespace_created)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "purple", "value": null}]}}}
        },
        {
          "title": "CPU Usage by Namespace",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace!=\"\"}[5m])) by (namespace)", "legendFormat": "{{namespace}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Memory Usage by Namespace",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace!=\"\"}) by (namespace) / 1024 / 1024", "legendFormat": "{{namespace}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "title": "CPU Usage by Pod (zord namespace)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"zord\", container!=\"\"}[5m])) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Memory Usage by Pod (zord namespace)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"zord\", container!=\"\"}) by (pod) / 1024 / 1024", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "title": "Network I/O by Pod (zord)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [
            {"expr": "sum(rate(container_network_receive_bytes_total{namespace=\"zord\"}[5m])) by (pod) / 1024", "legendFormat": "{{pod}} RX", "refId": "A"},
            {"expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"zord\"}[5m])) by (pod) / 1024", "legendFormat": "{{pod}} TX", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "KBs"}}
        },
        {
          "title": "Pod Restart Count (zord)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "sum(kube_pod_container_status_restarts_total{namespace=\"zord\"}) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["kubernetes", "zord", "cluster"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "Zord Kubernetes Cluster Overview",
      "uid": "zord-k8s-cluster"
    }
  kong-gateway.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "title": "Total Requests (all routes)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(increase(kong_http_requests_total[5m]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Error Rate (5xx)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "sum(rate(kong_http_requests_total{code=~\"5..\"}[5m]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 0.1}]}}}
        },
        {
          "title": "Avg Latency (ms)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "histogram_quantile(0.50, sum(rate(kong_request_latency_ms_bucket[5m])) by (le))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "ms", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 200}, {"color": "red", "value": 1000}]}}}
        },
        {
          "title": "P99 Latency (ms)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [{"expr": "histogram_quantile(0.99, sum(rate(kong_request_latency_ms_bucket[5m])) by (le))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "ms", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 500}, {"color": "red", "value": 2000}]}}}
        },
        {
          "title": "Requests per Route",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "sum(rate(kong_http_requests_total[5m])) by (route)", "legendFormat": "{{route}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "title": "Latency per Service",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(kong_upstream_latency_ms_bucket[5m])) by (le, service))", "legendFormat": "{{service}} p95", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "ms"}}
        },
        {
          "title": "Status Codes",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "sum(rate(kong_http_requests_total[5m])) by (code)", "legendFormat": "HTTP {{code}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "title": "Bandwidth",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {"expr": "sum(rate(kong_bandwidth_bytes{direction=\"ingress\"}[5m])) / 1024", "legendFormat": "Ingress KB/s", "refId": "A"},
            {"expr": "sum(rate(kong_bandwidth_bytes{direction=\"egress\"}[5m])) / 1024", "legendFormat": "Egress KB/s", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "KBs"}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["kong", "api-gateway", "zord"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "Kong API Gateway",
      "uid": "zord-kong-gateway"
    }
