apiVersion: v1
kind: ConfigMap
metadata:
  name: zord-postgres-bootstrap
data:
  00-bootstrap.sh: |
    #!/bin/sh
    set -eu

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<EOSQL
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'zord_user') THEN
        CREATE ROLE zord_user LOGIN PASSWORD '${EDGE_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'intent_user') THEN
        CREATE ROLE intent_user LOGIN PASSWORD '${INTENT_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'relay_user') THEN
        CREATE ROLE relay_user LOGIN PASSWORD '${RELAY_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'token_user') THEN
        CREATE ROLE token_user LOGIN PASSWORD '${TOKEN_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'outcome_user') THEN
        CREATE ROLE outcome_user LOGIN PASSWORD '${OUTCOME_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'evidence_user') THEN
        CREATE ROLE evidence_user LOGIN PASSWORD '${EVIDENCE_DB_PASSWORD}';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'zpi') THEN
        CREATE ROLE zpi LOGIN PASSWORD '${INTELLIGENCE_DB_PASSWORD}';
      END IF;
    END
    \$\$;

    SELECT 'CREATE DATABASE zord_edge_db OWNER zord_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_edge_db')\gexec
    SELECT 'CREATE DATABASE zord_intent_engine_db OWNER intent_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_intent_engine_db')\gexec
    SELECT 'CREATE DATABASE zord_relay_db OWNER relay_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_relay_db')\gexec
    SELECT 'CREATE DATABASE zord_token_enclave_db OWNER token_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_token_enclave_db')\gexec
    SELECT 'CREATE DATABASE zord_outcome_db OWNER outcome_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_outcome_db')\gexec
    SELECT 'CREATE DATABASE zord_evidence_db OWNER evidence_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_evidence_db')\gexec
    SELECT 'CREATE DATABASE zord_intelligence OWNER zpi'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zord_intelligence')\gexec
    EOSQL

    for db in \
      zord_edge_db \
      zord_intent_engine_db \
      zord_relay_db \
      zord_token_enclave_db \
      zord_outcome_db \
      zord_evidence_db \
      zord_intelligence
    do
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$db" <<EOSQL
      CREATE EXTENSION IF NOT EXISTS pgcrypto;
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    EOSQL
    done
