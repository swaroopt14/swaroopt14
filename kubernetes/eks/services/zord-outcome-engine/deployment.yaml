apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-outcome-engine
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-outcome-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-outcome-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zord-aws-access
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-outcome-engine
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-outcome-engine
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-outcome-engine
      containers:
        - name: zord-outcome-engine
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-outcome-engine:v6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: KAFKA_BROKERS
            - name: KAFKA_TOPIC
              value: payments.dispatch.events.v1
            - name: KAFKA_INTENT_TOPIC
              value: payments.intent.events.v1
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_PORT
            - name: DB_USER
              value: outcome_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: OUTCOME_DB_PASSWORD
            - name: DB_NAME
              value: zord_outcome_db
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_SSLMODE
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_EC2_METADATA_DISABLED
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: OUTCOME_S3_BUCKET
            - name: ZORD_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: ZORD_VAULT_KEY
            - name: RELAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: RELAY_SERVICES_2_AUTH_TOKEN
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-outcome-engine
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
