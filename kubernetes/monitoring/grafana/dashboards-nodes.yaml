apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-nodes
  namespace: monitoring
data:
  node-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "title": "Node Count",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{"expr": "count(up{job=\"node-exporter\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Total CPU Cores",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "targets": [{"expr": "count(node_cpu_seconds_total{mode=\"idle\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "title": "Cluster CPU Usage %",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "targets": [{"expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 60}, {"color": "red", "value": 85}]}}}
        },
        {
          "title": "Cluster Memory Usage %",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "targets": [{"expr": "(1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}}}
        },
        {
          "title": "Cluster Disk Usage %",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "targets": [{"expr": "(1 - (sum(node_filesystem_avail_bytes{mountpoint=\"/\"}) / sum(node_filesystem_size_bytes{mountpoint=\"/\"}))) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}}}
        },
        {
          "title": "Network Traffic",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "targets": [{"expr": "sum(rate(node_network_receive_bytes_total[5m])) / 1024 / 1024", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "MBs", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (instance) * 100)", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}
        },
        {
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{"expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}
        },
        {
          "title": "Disk I/O Read",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{"expr": "sum(rate(node_disk_read_bytes_total[5m])) by (instance) / 1024 / 1024", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "MBs"}}
        },
        {
          "title": "Disk I/O Write",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{"expr": "sum(rate(node_disk_written_bytes_total[5m])) by (instance) / 1024 / 1024", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "MBs"}}
        },
        {
          "title": "Network Receive per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{"expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|br.*\"}[5m])) by (instance) / 1024", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "KBs"}}
        },
        {
          "title": "Network Transmit per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{"expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|br.*\"}[5m])) by (instance) / 1024", "legendFormat": "{{instance}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "KBs"}}
        },
        {
          "title": "Pods per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "targets": [{"expr": "sum(kube_pod_info) by (node)", "legendFormat": "{{node}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Deployments Status",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "targets": [{"expr": "kube_deployment_status_replicas_available{namespace=~\"zord|api-gateway\"}", "format": "table", "instant": true, "refId": "A"}],
          "fieldConfig": {"defaults": {}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["nodes", "infrastructure", "zord"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "Node & Infrastructure Overview",
      "uid": "zord-nodes-infra"
    }
