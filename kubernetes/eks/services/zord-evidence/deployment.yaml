apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-evidence
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-evidence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-evidence
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8088"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zord-aws-access
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-evidence
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-evidence
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-evidence
      containers:
        - name: zord-evidence
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-evidence:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: http
          env:
            - name: PORT
              value: "8088"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: KAFKA_BROKERS
            - name: EVIDENCE_KAFKA_TOPIC
              value: z.outcome.events.v1
            - name: EVIDENCE_KAFKA_GROUP
              value: zord-evidence-group
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_PORT
            - name: DB_USER
              value: evidence_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_DB_PASSWORD
            - name: DB_NAME
              value: zord_evidence_db
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_SSLMODE
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_EC2_METADATA_DISABLED
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_S3_BUCKET
            - name: EVIDENCE_ARCHIVE_PREFIX
              value: evidence-packs
            - name: REPLAY_COMPARE_STRICT
              value: "true"
            - name: EVIDENCE_SIGNING_PRIVATE_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_SIGNING_PRIVATE_KEY_BASE64
            - name: EVIDENCE_ARCHIVE_ENCRYPTION_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_ARCHIVE_ENCRYPTION_KEY_BASE64
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-evidence
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
