apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-gateway
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: kong-gateway
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: arealis-zord
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: kong-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: kong-gateway
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kong-gateway
      containers:
        - name: kong
          # Build ecr kong images and update to the ECR
          image: kong:3.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 8000
              protocol: TCP
            - name: proxy-ssl
              containerPort: 8443
              protocol: TCP
            - name: admin
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 8100
              protocol: TCP
          env:
            # DB-less mode — config from declarative YAML
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /etc/kong-rendered/kong.yaml
            # Proxy settings
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            # Logging
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            # Performance
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "2"
            - name: KONG_UPSTREAM_KEEPALIVE_POOL_SIZE
              value: "60"
            - name: KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS
              value: "100"
            - name: KONG_UPSTREAM_KEEPALIVE_IDLE_TIMEOUT
              value: "60"
            # Status endpoint for health checks
            - name: KONG_STATUS_LISTEN
              value: "0.0.0.0:8100"
            # Plugins to load
            - name: KONG_PLUGINS
              value: "bundled"
          volumeMounts:
            - name: kong-rendered-config
              mountPath: /etc/kong-rendered
              readOnly: true
          readinessProbe:
            httpGet:
              path: /status
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 8100
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      # ── Init Container: Inject JWT secret into Kong config ────────────────
      # Replaces the placeholder in kong.yaml with the actual secret value
      # from the Kubernetes Secret. This avoids hardcoding secrets in Git.
      initContainers:
        - name: inject-jwt-secret
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s|KONG_JWT_SECRET_PLACEHOLDER|${JWT_SIGNING_SECRET}|g" \
                /etc/kong-template/kong.yaml > /etc/kong-rendered/kong.yaml
          env:
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: kong-jwt-secret
                  key: JWT_SIGNING_SECRET
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong-template
              readOnly: true
            - name: kong-rendered-config
              mountPath: /etc/kong-rendered
      volumes:
        - name: kong-config
          configMap:
            name: kong-declarative-config
        - name: kong-rendered-config
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
      terminationGracePeriodSeconds: 30
