apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-intent-engine
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-intent-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-intent-engine
    spec:
      serviceAccountName: zord-aws-access
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-intent-engine
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intent-engine
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intent-engine
      containers:
        - name: zord-intent-engine
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-intent-engine:v7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: KAFKA_BROKERS
              value: zord-kafka:9092
            - name: KAFKA_TOPIC
              value: payments.ledger.events.v1
            - name: KAFKA_TOPIC_PII_TOKENIZE_REQUEST
              value: pii.tokenize.request
            - name: KAFKA_TOPIC_PII_TOKENIZE_RESULT
              value: pii.tokenize.result
            - name: ZORD_PII_ENCLAVE_URL
              value: http://zord-token-enclave:8087
            - name: DB_HOST
              value: zord-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: intent_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTENT_DB_PASSWORD
            - name: DB_NAME
              value: zord_intent_engine_db
            - name: DB_SSLMODE
              value: disable
            - name: AWS_REGION
              value: ap-south-1
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: S3_BUCKET
              value: replace-me-intent-bucket
            - name: ZORD_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: ZORD_VAULT_KEY
            - name: RELAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: RELAY_SERVICES_0_AUTH_TOKEN
            - name: WORKER_POOL_SIZE
              value: "64"
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
