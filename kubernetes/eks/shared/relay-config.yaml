apiVersion: v1
kind: ConfigMap
metadata:
  name: zord-relay-config
data:
  config.yaml: |
    relay:
      poll_interval: 2s
      lease_limit: 500
      lease_ttl_seconds: 120
      max_publish_concurrency: 10
      shutdown_timeout: 30s

    kafka:
      brokers: "zord-kafka:9092"
      sasl_mechanism: SCRAM-SHA-512
      sasl_username: ""
      sasl_password: ""
      tls_enabled: false
      acks: "all"
      linger_ms: 5
      compression_type: snappy
      message_max_bytes: 1048576
      delivery_timeout: 30s
      dlq_publish_failure_topic: relay.dlq.publish_failure
      dlq_poison_topic: relay.dlq.poison

    services:
      - name: intent-engine
        base_url: http://zord-intent-engine:8083
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: payments.intent.events.v1
      - name: edge
        base_url: http://zord-edge:8080
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: payments.ledger.events.v1
      - name: outcome-engine
        base_url: http://zord-outcome-engine:8081
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: payments.outcome.events.v1
        topic_map:
          canonical.settlement.created: canonical.settlement.created
          canonical.settlement.batch_ready: canonical.settlement.created
          attachment.decision.created: attachment.decision.created
          variance.record.created: variance.record.created
          attachment.batch.updated: batch.summary.updated
          attachment.unresolved.flagged: batch.summary.updated
      - name: intent-engine-dlq
        base_url: http://zord-intent-engine:8083
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: payments.intent.dlq
        is_dlq: true
      - name: intent-engine-batch
        base_url: http://zord-intent-engine:8083
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: batch.canonicalization.completed
        is_batch: true
      - name: evidence-service
        base_url: http://zord-evidence:8088
        auth_token: "dev-dummy-token-123"
        http_timeout: 15s
        default_topic: evidence.pack.created

    tracing:
      enabled: true
      otlp_endpoint: "otel-collector.tracing.svc.cluster.local:4318"
      service_name: relay-service
      environment: production

    metrics:
      enabled: true
      addr: ":8082"

    db:
      url: ""
      max_open_conns: 20
      max_idle_conns: 5

    psp:
      base_url: ""
      timeout_seconds: 30

    token_enclave:
      base_url: "http://zord-token-enclave:8087"
      timeout_seconds: 10

    dispatch:
      enabled: false
      consumer_group_id: "dispatch-loop-group"
      topic: "payments.intent.events.v1"
      poll_timeout: 200ms
      connector_id: "razorpayx-v1"
      default_corridor_id: "IMPS"
      worker_count: 4
      psp_circuit_breaker_threshold: 5
      psp_circuit_reset_seconds: 60

    relay_loop:
      worker_count: 2
      batch_size: 50
      poll_interval: 2s
      dispatch_events_topic: "payments.dispatch.events.v1"
      publish_failure_dlq_topic: "relay.dlq.publish_failure"
      poison_event_dlq_topic: "relay.dlq.poison"

    retry_sweeper:
      interval: 30s
      batch_size: 20

    recovery_sweeper:
      interval: 60s
      sent_timeout_seconds: 120
      awaiting_timeout_seconds: 300
      batch_size: 50
