# ─────────────────────────────────────────────────────────────────────────────
# Network Policies for Kong API Gateway
# ─────────────────────────────────────────────────────────────────────────────
# Restricts access to Kong admin API (port 8001) to only:
#   - Konga UI pods (for admin management)
#   - Prometheus (for metrics scraping)
#   - Pods within the api-gateway namespace
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-admin-restrict
  namespace: api-gateway
spec:
  podSelector:
    matchLabels:
      app: kong
  policyTypes:
    - Ingress
  ingress:
    # Allow proxy traffic from anywhere (ALB → Kong proxy port)
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
    # Allow admin access only from within api-gateway namespace + monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: api-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8001
          protocol: TCP
        - port: 8444
          protocol: TCP
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8100
          protocol: TCP
