apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-intelligence
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-intelligence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-intelligence
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8089"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 45
      serviceAccountName: zord-aws-access
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-intelligence
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intelligence
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-intelligence
      containers:
        - name: zord-intelligence
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-intelligence:v6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: HTTP_PORT
              value: "8089"
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTELLIGENCE_DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: KAFKA_BROKERS
            - name: KAFKA_GROUP_ID
              value: zord-intelligence-group
            - name: INTELLIGENCE_MODE
              value: GRADE_A
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-intelligence
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8089
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1.5"
              memory: 2Gi
