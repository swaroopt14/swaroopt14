# ─────────────────────────────────────────────────────────────────────────────
# Argo CD ConfigMap Patch
# ─────────────────────────────────────────────────────────────────────────────
# Applied after installing Argo CD to configure:
#   - Server URL (for UI redirects)
#   - Disable TLS on server (ALB handles TLS termination)
#   - Kustomize build options
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  # Disable internal TLS — ALB terminates TLS
  server.insecure: "true"
  # Set the external URL for Argo CD
  server.rootpath: ""
