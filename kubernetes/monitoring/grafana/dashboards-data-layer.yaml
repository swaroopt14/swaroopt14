apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-data-layer
  namespace: monitoring
data:
  data-layer.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "title": "PostgreSQL — Active Connections",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "pg_stat_activity_count", "legendFormat": "{{datname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "PostgreSQL — Database Size (MB)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "pg_database_size_bytes / 1024 / 1024", "legendFormat": "{{datname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "title": "PostgreSQL — Transactions/sec",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {"expr": "rate(pg_stat_database_xact_commit{datname=~\"zord.*\"}[5m])", "legendFormat": "{{datname}} commits", "refId": "A"},
            {"expr": "rate(pg_stat_database_xact_rollback{datname=~\"zord.*\"}[5m])", "legendFormat": "{{datname}} rollbacks", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "ops"}}
        },
        {
          "title": "PostgreSQL — Cache Hit Ratio %",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [{"expr": "pg_stat_database_blks_hit{datname=~\"zord.*\"} / (pg_stat_database_blks_hit{datname=~\"zord.*\"} + pg_stat_database_blks_read{datname=~\"zord.*\"}) * 100", "legendFormat": "{{datname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"steps": [{"color": "red", "value": 0}, {"color": "yellow", "value": 90}, {"color": "green", "value": 99}]}}}
        },
        {
          "title": "PostgreSQL — Dead Tuples (needs vacuum)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [{"expr": "pg_stat_user_tables_n_dead_tup", "legendFormat": "{{relname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "PostgreSQL — Locks",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [{"expr": "pg_locks_count", "legendFormat": "{{datname}} {{mode}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Kafka — Consumer Group Lag",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "targets": [{"expr": "kafka_consumergroup_lag", "legendFormat": "{{consumergroup}} / {{topic}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Kafka — Messages In/sec per Topic",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24},
          "targets": [{"expr": "rate(kafka_topic_partition_current_offset[5m])", "legendFormat": "{{topic}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "msg/s"}}
        },
        {
          "title": "Kafka — Partitions per Topic",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
          "targets": [{"expr": "kafka_topic_partitions", "format": "table", "instant": true, "refId": "A"}]
        },
        {
          "title": "Kafka — Broker Status",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 32},
          "targets": [{"expr": "count(kafka_brokers)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}]}}}
        },
        {
          "title": "Kafka — Total Topics",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 32},
          "targets": [{"expr": "count(kafka_topic_partitions)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}}
        },
        {
          "title": "Kafka — Under-Replicated Partitions",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 36},
          "targets": [{"expr": "kafka_topic_partition_under_replicated_partition", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]}}}
        },
        {
          "title": "Kafka — Consumer Groups",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 36},
          "targets": [{"expr": "count(kafka_consumergroup_current_offset) by (consumergroup)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "purple", "value": null}]}}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["postgresql", "kafka", "data-layer", "zord"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "PostgreSQL & Kafka — Data Layer",
      "uid": "zord-data-layer"
    }
