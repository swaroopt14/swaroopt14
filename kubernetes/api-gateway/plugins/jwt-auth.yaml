# ─────────────────────────────────────────────────────────────────────────────
# Kong Plugin: JWT Authentication
# ─────────────────────────────────────────────────────────────────────────────
# ENABLED in kong/configmap.yaml (per-route basis).
#
# ═══════════════════════════════════════════════════════════════════════════════
# CURRENT STATE
# ═══════════════════════════════════════════════════════════════════════════════
#
# JWT validation is now enforced at the Kong gateway level for all protected
# routes. Public routes (auth, health checks, webhooks) are exempt.
#
# ═══════════════════════════════════════════════════════════════════════════════
# PROTECTED ROUTES (require Authorization: Bearer <JWT>)
# ═══════════════════════════════════════════════════════════════════════════════
#
# zord-edge:
#   - edge-admin (/v1/admin)
#   - edge-bulk-ingest (/v1/bulk-ingest)
#   - edge-ingest (/v1/ingest)
#   - edge-tenants (/v1/tenants)
#   - edge-connectors (/v1/connectors)
#
# zord-intent-engine:
#   - intent-api (/v1/intents)
#   - intent-dlq (/v1/dlq)
#   - intent-etl (/v1/etl)
#
# zord-relay:
#   - relay-dispatch (/v1/dispatch)
#
# zord-outcome-engine:
#   - outcome-settlement (/v1/settlement)
#   - outcome-reconciliation (/v1/reconciliation)
#
# zord-evidence:
#   - evidence-packs (/v1/evidence)
#   - evidence-verify (/v1/verify)
#
# zord-intelligence:
#   - intelligence-projections (/v1/projections)
#   - intelligence-policies (/v1/policies)
#   - intelligence-rca (/v1/rca)
#
# zord-prompt-layer:
#   - prompt-query (/v1/query)
#   - prompt-chat (/v1/chat)
#
# ═══════════════════════════════════════════════════════════════════════════════
# PUBLIC ROUTES (no JWT required)
# ═══════════════════════════════════════════════════════════════════════════════
#
#   - edge-auth (/v1/auth/*) — login, signup, refresh, MFA verify
#   - edge-webhooks (/v1/webhooks) — external provider callbacks
#   - edge-health (/edge/health)
#   - intent-health (/intent/health)
#   - relay-health (/relay/health)
#   - outcome-health (/outcome/health)
#   - evidence-health (/evidence/health)
#   - intelligence-health (/intelligence/health)
#   - prompt-health (/prompt/health)
#   - token-enclave-health (/token/health)
#   - console-root (/) — frontend
#
# ═══════════════════════════════════════════════════════════════════════════════
# HOW IT WORKS
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. User logs in via POST /v1/auth/login
# 2. zord-edge validates credentials (+ MFA if enabled)
# 3. zord-edge issues a JWT with claims:
#      {
#        "iss": "zord-edge",        ← must match consumer jwt_secrets.key
#        "sub": "<user_id>",
#        "tenant_id": "<tenant_id>",
#        "role": "CUSTOMER_USER",
#        "exp": <unix_timestamp>     ← validated by Kong
#      }
# 4. Client includes: Authorization: Bearer <jwt>
# 5. Kong validates:
#      - Signature matches the shared secret
#      - "exp" claim has not passed
#      - "iss" matches a registered consumer
# 6. If valid → request passes to upstream service
# 7. If invalid → Kong returns 401 Unauthorized (no backend hit)
#
# ═══════════════════════════════════════════════════════════════════════════════
# SETUP REQUIREMENTS
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. zord-edge must sign JWTs with the SAME secret configured in Kong consumer
# 2. JWT must include "iss": "zord-edge" claim
# 3. JWT must include "exp" claim (Unix timestamp)
# 4. The signing secret in configmap.yaml uses ${JWT_SIGNING_SECRET} placeholder
#    → In production, inject this via Kubernetes Secret:
#
#    apiVersion: v1
#    kind: Secret
#    metadata:
#      name: kong-jwt-secret
#      namespace: api-gateway
#    type: Opaque
#    data:
#      JWT_SIGNING_SECRET: <base64-encoded-secret>
#
# 5. Update kong deployment to mount the secret as an env var and replace
#    the placeholder in the declarative config.
#
# ═══════════════════════════════════════════════════════════════════════════════
# ERROR RESPONSES (when JWT is missing or invalid)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Missing token:
#   HTTP 401 — { "message": "Unauthorized" }
#
# Invalid/expired token:
#   HTTP 401 — { "message": "Unauthorized" }
#
# ─────────────────────────────────────────────────────────────────────────────
