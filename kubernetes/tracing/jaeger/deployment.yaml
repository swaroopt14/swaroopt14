apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: tracing
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        # ── Jaeger All-in-One ──
        - name: jaeger
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/mirror/jaeger:1.55
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 14268
              name: http-collector
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: badger
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: /badger/data
            - name: BADGER_DIRECTORY_KEY
              value: /badger/key
            - name: METRICS_STORAGE_TYPE
              value: prometheus
            - name: PROMETHEUS_SERVER_URL
              value: http://prometheus.monitoring.svc.cluster.local:9090
            - name: PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR
              value: "true"
            - name: PROMETHEUS_QUERY_NORMALIZE_CALLS
              value: "true"
            - name: PROMETHEUS_QUERY_NORMALIZE_DURATION
              value: "true"
            - name: QUERY_BASE_PATH
              value: /
            - name: DEPENDENCY_STORAGE_TYPE
              value: badger
          volumeMounts:
            - name: data
              mountPath: /badger
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true

        # ── Nginx Auth Sidecar — password protects Jaeger UI ──
        - name: auth-proxy
          image: public.ecr.aws/nginx/nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: auth-proxy
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: htpasswd
              mountPath: /etc/nginx/htpasswd
              subPath: htpasswd
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jaeger-data
        - name: nginx-config
          secret:
            secretName: jaeger-credentials
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: htpasswd
          secret:
            secretName: jaeger-credentials
            items:
              - key: htpasswd
                path: htpasswd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-data
  namespace: tracing
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
