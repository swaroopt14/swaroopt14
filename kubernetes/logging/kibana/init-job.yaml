apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-init
  namespace: logging
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kibana-init
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/mirror/curl:8.7.1
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: ELASTIC_PASSWORD
            - name: KIBANA_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: KIBANA_SYSTEM_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              ES_URL="http://elasticsearch.logging.svc.cluster.local:9200"
              KB_URL="http://kibana.logging.svc.cluster.local:5601"
              ES_AUTH="elastic:${ELASTIC_PASSWORD}"

              echo "=== Step 1: Wait for Elasticsearch ==="
              until curl -s -u "${ES_AUTH}" "${ES_URL}/_cluster/health" | grep -q '"status"'; do
                echo "ES not ready, waiting..." && sleep 10
              done
              echo "Elasticsearch is ready."

              echo "=== Step 2: Set kibana_system password ==="
              curl -s -X POST "${ES_URL}/_security/user/kibana_system/_password" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d "{\"password\": \"${KIBANA_SYSTEM_PASSWORD}\"}" && echo " -> done"

              echo "=== Step 3: Wait for Kibana ==="
              until curl -s -u "elastic:${ELASTIC_PASSWORD}" "${KB_URL}/api/status" | grep -q '"overall"'; do
                echo "Kibana not ready, waiting..." && sleep 10
              done
              echo "Kibana is ready."

              echo "=== Step 4: ES index template (keyword mappings) ==="
              curl -s -X PUT "${ES_URL}/_index_template/zord-logs-template" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d '{
                  "index_patterns": ["zord-logs-*"],
                  "priority": 200,
                  "template": {
                    "settings": {
                      "number_of_shards": 1,
                      "number_of_replicas": 0,
                      "index.mapping.total_fields.limit": 500
                    },
                    "mappings": {
                      "dynamic_templates": [{"strings_as_keywords": {"match_mapping_type": "string","mapping": {"type": "keyword","ignore_above": 1024}}}],
                      "properties": {
                        "message": {"type": "text"},
                        "stream": {"type": "keyword"},
                        "container": {"type": "keyword"},
                        "namespace": {"type": "keyword"},
                        "pod": {"type": "keyword"},
                        "service": {"type": "keyword"},
                        "cluster": {"type": "keyword"},
                        "logtag": {"type": "keyword"},
                        "tag": {"type": "keyword"},
                        "@timestamp": {"type": "date"},
                        "time": {"type": "date"}
                      }
                    }
                  }
                }' && echo " -> index template created"

              curl -s -X PUT "${ES_URL}/_cluster/settings" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d '{"transient":{"action.destructive_requires_name":false}}' > /dev/null

              echo "=== Step 5: Kibana data views ==="
              curl -s -X POST "${KB_URL}/api/data_views/data_view" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"data_view":{"title":"zord-logs-*","name":"Zord Application Logs","timeFieldName":"@timestamp"}}' && echo " -> zord-logs"

              curl -s -X POST "${KB_URL}/api/data_views/data_view" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"data_view":{"title":"kong-access-*","name":"Kong Access Logs","timeFieldName":"@timestamp"}}' && echo " -> kong-access"

              curl -s -X POST "${KB_URL}/api/data_views/default" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"data_view_id":"zord-logs-*","force":true}' && echo " -> default set"

              echo "=== Step 6: Alert rules ==="
              sleep 30

              curl -s -X POST "${KB_URL}/api/alerting/rule" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"name":"Service Error Logs Detected","consumer":"stackAlerts","rule_type_id":".es-query","schedule":{"interval":"1m"},"params":{"index":["zord-logs-*"],"timeField":"@timestamp","esQuery":"{\"query\":{\"bool\":{\"must\":[{\"term\":{\"stream\":\"stderr\"}},{\"range\":{\"@timestamp\":{\"gte\":\"now-5m\"}}}]}}}","timeWindowSize":5,"timeWindowUnit":"m","threshold":[10],"thresholdComparator":">"},"actions":[],"tags":["zord","error"],"enabled":true}' && echo " -> Error logs alert"

              curl -s -X POST "${KB_URL}/api/alerting/rule" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"name":"Critical Error (panic/fatal)","consumer":"stackAlerts","rule_type_id":".es-query","schedule":{"interval":"1m"},"params":{"index":["zord-logs-*"],"timeField":"@timestamp","esQuery":"{\"query\":{\"bool\":{\"should\":[{\"match_phrase\":{\"message\":\"panic\"}},{\"match_phrase\":{\"message\":\"fatal\"}}],\"minimum_should_match\":1,\"filter\":[{\"range\":{\"@timestamp\":{\"gte\":\"now-5m\"}}}]}}}","timeWindowSize":5,"timeWindowUnit":"m","threshold":[1],"thresholdComparator":">="},"actions":[],"tags":["zord","critical"],"enabled":true}' && echo " -> Critical alert"

              curl -s -X POST "${KB_URL}/api/alerting/rule" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"name":"Database Connection Errors","consumer":"stackAlerts","rule_type_id":".es-query","schedule":{"interval":"2m"},"params":{"index":["zord-logs-*"],"timeField":"@timestamp","esQuery":"{\"query\":{\"bool\":{\"should\":[{\"match_phrase\":{\"message\":\"connection refused\"}},{\"match_phrase\":{\"message\":\"dial tcp\"}},{\"match_phrase\":{\"message\":\"pq:\"}}],\"minimum_should_match\":1,\"filter\":[{\"range\":{\"@timestamp\":{\"gte\":\"now-5m\"}}}]}}}","timeWindowSize":5,"timeWindowUnit":"m","threshold":[3],"thresholdComparator":">="},"actions":[],"tags":["zord","database"],"enabled":true}' && echo " -> DB alert"

              curl -s -X POST "${KB_URL}/api/alerting/rule" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"name":"Kafka Connection Errors","consumer":"stackAlerts","rule_type_id":".es-query","schedule":{"interval":"2m"},"params":{"index":["zord-logs-*"],"timeField":"@timestamp","esQuery":"{\"query\":{\"bool\":{\"must\":[{\"match_phrase\":{\"message\":\"kafka\"}},{\"term\":{\"stream\":\"stderr\"}}],\"filter\":[{\"range\":{\"@timestamp\":{\"gte\":\"now-5m\"}}}]}}}","timeWindowSize":5,"timeWindowUnit":"m","threshold":[5],"thresholdComparator":">="},"actions":[],"tags":["zord","kafka"],"enabled":true}' && echo " -> Kafka alert"

              curl -s -X POST "${KB_URL}/api/alerting/rule" \
                -u "elastic:${ELASTIC_PASSWORD}" -H "kbn-xsrf: true" -H "Content-Type: application/json" \
                -d '{"name":"High Error Log Volume","consumer":"stackAlerts","rule_type_id":".es-query","schedule":{"interval":"2m"},"params":{"index":["zord-logs-*"],"timeField":"@timestamp","esQuery":"{\"query\":{\"bool\":{\"must\":[{\"term\":{\"stream\":\"stderr\"}}],\"filter\":[{\"range\":{\"@timestamp\":{\"gte\":\"now-2m\"}}}]}}}","timeWindowSize":2,"timeWindowUnit":"m","threshold":[100],"thresholdComparator":">"},"actions":[],"tags":["zord","crash-loop"],"enabled":true}' && echo " -> High volume alert"

              echo "=== Step 7: ILM policy ==="
              curl -s -X PUT "${ES_URL}/_ilm/policy/zord-logs-policy" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d '{"policy":{"phases":{"hot":{"actions":{"rollover":{"max_age":"7d","max_size":"5gb"}}},"warm":{"min_age":"7d","actions":{"shrink":{"number_of_shards":1},"forcemerge":{"max_num_segments":1}}},"delete":{"min_age":"30d","actions":{"delete":{}}}}}}' && echo " -> ILM policy created"

              curl -s -X PUT "${ES_URL}/_index_template/zord-logs-template" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d '{"index_patterns":["zord-logs-*"],"priority":200,"template":{"settings":{"index.lifecycle.name":"zord-logs-policy","number_of_shards":1,"number_of_replicas":0},"mappings":{"dynamic_templates":[{"strings_as_keywords":{"match_mapping_type":"string","mapping":{"type":"keyword","ignore_above":1024}}}],"properties":{"message":{"type":"text"},"stream":{"type":"keyword"},"container":{"type":"keyword"},"namespace":{"type":"keyword"},"pod":{"type":"keyword"},"service":{"type":"keyword"},"cluster":{"type":"keyword"},"tag":{"type":"keyword"},"@timestamp":{"type":"date"},"time":{"type":"date"}}}}}' && echo " -> ILM template applied"

              curl -s -X PUT "${ES_URL}/_index_template/kong-access-template" \
                -u "${ES_AUTH}" -H "Content-Type: application/json" \
                -d '{"index_patterns":["kong-access-*"],"template":{"settings":{"index.lifecycle.name":"zord-logs-policy","number_of_shards":1,"number_of_replicas":0}}}' && echo " -> Kong ILM applied"

              echo "=== Setup Complete ==="
              echo ""
              echo "============================================"
              echo "  KIBANA SECURITY SETUP COMPLETE"
              echo "============================================"
              echo "  URL: https://kibana.zordnet.com"
              echo ""
              echo "  Login:  elastic / Arealiszord@2026"
              echo "============================================"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
