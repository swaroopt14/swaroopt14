# ─────────────────────────────────────────────────────────────────────────────
# Kong Plugin: CORS (Cross-Origin Resource Sharing)
# ─────────────────────────────────────────────────────────────────────────────
# Configured in kong/configmap.yaml (declarative config).
# This file serves as documentation and reference.
#
# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Allowed Origins:
#   - https://zordnet.com          (production)
#   - https://www.zordnet.com      (production www)
#   - http://localhost:3000         (local development)
#
# Allowed Methods:
#   - GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD
#
# Allowed Headers:
#   - Accept
#   - Authorization                (Bearer token for API auth)
#   - Content-Type
#   - X-Zord-ADMIN-KEY            (admin operations)
#   - X-Zord-Source-Type          (bulk ingest: CSV/XLSX)
#   - X-Zord-Source-Class         (bulk ingest: INTENT/SETTLEMENT)
#   - X-Zord-Tenant-Type          (tenant type: BANK/FINTECH)
#   - X-Tenant-Id                 (tenant scoping for prompt-layer)
#   - Batch-Id                    (settlement batch identifier)
#
# Exposed Headers (visible to browser JavaScript):
#   - X-Request-Id                (correlation ID for debugging)
#   - X-Kong-Upstream-Latency     (backend response time)
#   - X-Kong-Proxy-Latency        (Kong processing time)
#
# Other Settings:
#   - credentials: true            (allow cookies/auth headers)
#   - max_age: 3600               (cache preflight for 1 hour)
#   - preflight_continue: false    (Kong handles OPTIONS, not upstream)
#
# ═══════════════════════════════════════════════════════════════════════════════
# ADDING NEW ORIGINS
# ═══════════════════════════════════════════════════════════════════════════════
#
# To add a staging domain:
#   1. Edit kong/configmap.yaml
#   2. Add to origins list: "https://staging.zordnet.com"
#   3. Redeploy: kubectl apply -k kubernetes/api-gateway
#   4. Reload Kong: kubectl rollout restart deployment/kong-gateway -n api-gateway
# ─────────────────────────────────────────────────────────────────────────────
