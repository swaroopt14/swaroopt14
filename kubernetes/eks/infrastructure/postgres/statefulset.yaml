apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zord-postgres
spec:
  serviceName: zord-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-postgres
    spec:
      securityContext:
        fsGroup: 999
      priorityClassName: infra-critical
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: POSTGRES_SUPERUSER_PASSWORD
            - name: EDGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EDGE_DB_PASSWORD
            - name: INTENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTENT_DB_PASSWORD
            - name: RELAY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: RELAY_DB_PASSWORD
            - name: TOKEN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: TOKEN_DB_PASSWORD
            - name: OUTCOME_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: OUTCOME_DB_PASSWORD
            - name: EVIDENCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EVIDENCE_DB_PASSWORD
            - name: INTELLIGENCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTELLIGENCE_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: bootstrap
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: bootstrap
          configMap:
            name: zord-postgres-bootstrap
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
