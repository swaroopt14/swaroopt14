apiVersion: v1
kind: ServiceAccount
metadata:
  name: zord-aws-access
  # Pods that read/write S3 should use IRSA instead of node-role permissions.
  # Create an IAM role that trusts this service account, then uncomment and
  # replace the ARN below.
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::522189039032:role/ZordAppS3AccessRole
