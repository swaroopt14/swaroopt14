apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-nginx-config
  namespace: tracing
data:
  nginx.conf: |
    events {
      worker_connections 128;
    }
    http {
      server {
        listen 8080;

        # Basic auth for Jaeger UI
        auth_basic "Jaeger Tracing - Zord Platform";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        location / {
          proxy_pass http://localhost:16686;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (no auth)
        location /health {
          auth_basic off;
          return 200 'ok';
          add_header Content-Type text/plain;
        }
      }
    }
