version: "3.9"

services:

  # ── Zord Relay Service ─────────────────────────────────────────────────────
  zord-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-relay-service
    ports:
      - "8082:8082"
    environment:
      - RELAY_KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_CONSUMER_GROUP=zord-relay-group
      - RELAY_SERVICES_0_AUTH_TOKEN=dev-dummy-token-123
      - KAFKA_READY_TOPIC=z.intent.ready.v1
      - KAFKA_DLQ_TOPIC=z.intent.dlq.v1
      - HTTP_PORT=8082
      - DATABASE_URL=postgres://relay_user:relay_password@postgres:5432/zord_relay_db?sslmode=disable
      - ENVIRONMENT=production
      - SERVICE_NAME=zord-relay
      - OUTBOX_POLL_INTERVAL=5s
      - OUTBOX_BATCH_SIZE=10
    depends_on:
      - broker1
      - broker2
      - broker3
      - postgres
    networks:
      - zord-network
    restart: unless-stopped

  # ── Kafka Brokers ──────────────────────────────────────────────────────────
  broker1:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Enable auto-create topics
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka1_data:/var/lib/kafka/data
      - kafka1_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  broker2:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Enable auto-create topics
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka2_data:/var/lib/kafka/data
      - kafka2_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9093 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  broker3:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker3
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9097
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker3:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Enable auto-create topics
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka3_data:/var/lib/kafka/data
      - kafka3_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9094 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Create required topics ─────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: relay_kafka_init
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
      broker3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      bash -c "
      kafka-topics --bootstrap-server broker1:9092 --create --if-not-exists --topic payments.intent.events.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server broker1:9092 --create --if-not-exists --topic payments.ledger.events.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server broker1:9092 --create --if-not-exists --topic relay.dlq.publish_failure --partitions 3 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server broker1:9092 --create --if-not-exists --topic relay.dlq.poison --partitions 3 --replication-factor 1 --config retention.ms=604800000
      echo 'Topics created.'
      "

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zord-relay-postgres
    environment:
      - POSTGRES_USER=relay_user
      - POSTGRES_PASSWORD=relay_password
      - POSTGRES_DB=zord_relay_db
    volumes:
      - postgres_relay_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    networks:
      - zord-network
    restart: unless-stopped

volumes:
  kafka1_data:
  kafka1_metadata:
  kafka2_data:
  kafka2_metadata:
  kafka3_data:
  kafka3_metadata:
  postgres_relay_data:

networks:
  zord-network:
    external: true
    name: zord-shared-network