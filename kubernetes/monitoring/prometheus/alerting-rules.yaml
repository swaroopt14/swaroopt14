apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerting-rules
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: infrastructure
        rules:
          # Node CPU > 85% for 5 minutes
          - alert: HighNodeCPU
            expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} CPU is {{ $value }}% (threshold: 85%)"

          # Node Memory > 90% for 5 minutes
          - alert: HighNodeMemory
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High memory on {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} memory is {{ $value }}% (threshold: 90%)"

          # Disk > 80%
          - alert: DiskSpaceLow
            expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk space low on {{ $labels.instance }}"
              description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"

          # PVC > 85%
          - alert: PVCAlmostFull
            expr: (1 - (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes)) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} almost full"
              description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is {{ $value }}% full"

      - name: pods
        rules:
          # Pod restarting more than 5 times in 1 hour
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"zord|api-gateway"}[1h]) > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} restarted {{ $value }} times in the last hour"

          # Pod pending for more than 5 minutes
          - alert: PodPending
            expr: kube_pod_status_phase{phase="Pending", namespace=~"zord|api-gateway"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} stuck in Pending"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been Pending for more than 5 minutes"

          # OOM Killed
          - alert: ContainerOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace=~"zord|api-gateway"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} OOM killed"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOM killed"

      - name: kong-gateway
        rules:
          # Kong error rate > 5%
          - alert: HighErrorRate
            expr: sum(rate(kong_http_requests_total{code=~"5.."}[5m])) / sum(rate(kong_http_requests_total[5m])) * 100 > 5
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Kong error rate is {{ $value }}%"
              description: "More than 5% of requests are returning 5xx errors"

          # Kong latency p99 > 3 seconds
          - alert: HighLatency
            expr: histogram_quantile(0.99, sum(rate(kong_request_latency_ms_bucket[5m])) by (le)) > 3000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kong p99 latency is {{ $value }}ms"
              description: "p99 latency exceeded 3 seconds"

          # Kong service down (upstream unreachable)
          - alert: ServiceDown
            expr: kong_upstream_target_health{state="unhealthy"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Kong upstream {{ $labels.upstream }} is unhealthy"
              description: "Backend service {{ $labels.upstream }} is not responding"

      - name: zord-platform
        rules:
          # Service not available (0 ready pods)
          - alert: ServiceUnavailable
            expr: kube_deployment_status_replicas_available{namespace="zord"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.deployment }} has 0 available replicas"
              description: "{{ $labels.deployment }} in namespace {{ $labels.namespace }} has no running pods"

          # HPA at max replicas (can't scale more)
          - alert: HPAMaxedOut
            expr: kube_horizontalpodautoscaler_status_current_replicas == kube_horizontalpodautoscaler_spec_max_replicas
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
              description: "{{ $labels.horizontalpodautoscaler }} has been at max replicas for 10 minutes — may need capacity increase"

          # External Secrets not syncing
          - alert: SecretSyncFailed
            expr: externalsecret_status_condition{status="False", condition="Ready"} == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "ExternalSecret {{ $labels.name }} sync failed"
              description: "Secret {{ $labels.name }} in {{ $labels.namespace }} is not syncing from AWS Secrets Manager"
