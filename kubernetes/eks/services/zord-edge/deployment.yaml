apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-edge
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: zord-aws-access
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zord-edge
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-edge
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zord-edge
      containers:
        - name: zord-edge
          image: 522189039032.dkr.ecr.ap-south-1.amazonaws.com/zord/zord-edge:v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_PORT
            - name: DB_USER
              value: zord_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EDGE_DB_PASSWORD
            - name: DB_NAME
              value: zord_edge_db
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: DB_SSLMODE
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_REGION
            - name: AWS_EC2_METADATA_DISABLED
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: AWS_EC2_METADATA_DISABLED
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: EDGE_S3_BUCKET
            - name: SIGNING_KEY_PATH
              value: /run/secrets/ed25519_private.pem
            - name: VAULT_KEY_ID
              value: key-1234567890
            - name: OBJECT_STORE_VERSION
              value: v1
            - name: ZORD_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: ZORD_VAULT_KEY
            - name: INTERNAL_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: INTERNAL_ADMIN_KEY
            - name: JWT_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: JWT_SIGNING_SECRET
            - name: RELAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zord-app-secrets
                  key: RELAY_SERVICES_1_AUTH_TOKEN
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: zord-aws-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: zord-edge
          volumeMounts:
            - name: signing-key
              mountPath: /run/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: signing-key
          secret:
            secretName: zord-edge-signing-key
