apiVersion: apps/v1
kind: Deployment
metadata:
  name: konga
  namespace: api-gateway
  labels:
    app: konga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: konga
  template:
    metadata:
      labels:
        app: konga
    spec:
      containers:
        - name: konga
          image: pantsel/konga:0.14.9
          env:
            - name: NODE_ENV
              value: production
            - name: DB_ADAPTER
              value: localDiskDb
            # Kong Admin API URL (internal cluster DNS)
            - name: KONGA_HOOK_TIMEOUT
              value: "120000"
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: konga-secrets
                  key: TOKEN_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 1337
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 1337
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 1337
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: konga-data
              mountPath: /app/kongadata
      volumes:
        - name: konga-data
          emptyDir: {}
