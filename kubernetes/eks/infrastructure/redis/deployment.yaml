apiVersion: apps/v1
kind: Deployment
metadata:
  name: zord-prompt-layer-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zord-prompt-layer-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zord-prompt-layer-redis
    spec:
      priorityClassName: infra-critical
      # Schedule on the stateful on-demand node group
      tolerations:
        - key: workload
          value: stateful
          effect: NoSchedule
      nodeSelector:
        workload: stateful
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 300Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 20
