apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.13.0
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch.logging.svc.cluster.local:9200
            # ── Security: Kibana connects to ES as kibana_system user ──
            - name: ELASTICSEARCH_USERNAME
              value: "kibana_system"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: KIBANA_SYSTEM_PASSWORD
            # ── Security: Enable Kibana login page ──
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.encryptedSavedObjects.encryptionKey
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: KIBANA_ENCRYPTION_KEY
            - name: xpack.security.encryptionKey
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: KIBANA_ENCRYPTION_KEY
            - name: xpack.reporting.encryptionKey
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: KIBANA_ENCRYPTION_KEY
            - name: telemetry.enabled
              value: "false"
            - name: SERVER_PUBLICBASEURL
              value: "https://kibana.zordnet.com"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
