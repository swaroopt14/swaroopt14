apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zord-evidence-signing-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: zord-evidence-signing-key
    creationPolicy: Owner
  data:
    - secretKey: signing_key.pem
      remoteRef:
        key: production/zord/evidence-signing-key
        property: signing_key.pem
