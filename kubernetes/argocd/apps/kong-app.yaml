apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-api-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: arealis-zord
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Arealis-network/Arealis-Zord-intent.git
    targetRevision: main
    path: kubernetes/api-gateway

  destination:
    server: https://kubernetes.default.svc
    namespace: api-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
